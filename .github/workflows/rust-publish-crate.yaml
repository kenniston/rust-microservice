on:
  workflow_call:

jobs:
  rust-publish-crate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Setup the Rust toolchain
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      # Login to crates.io using the API token stored in GitHub Secrets
      - name: cargo login
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |-
          echo "ℹ️ Logging into crates.io..."
          echo "TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}"
          echo "$CARGO_REGISTRY_TOKEN" | cargo login

      # Publish the crate to crates.io
      - name: "cargo release publish"
        run: |-
          cargo publish \
            --all-features \
            --no-verify \
            --allow-dirty \
            --dry-run



